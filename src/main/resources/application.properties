spring.application.name=ai-tracing-otel

# --- Databricks Connection ---
# Profile name from ~/.databrickscfg. Set to DEFAULT or omit to fall back to
# environment variables (DATABRICKS_HOST + DATABRICKS_TOKEN, or OAuth).
databricks.config-profile=DEFAULT
databricks.otel.catalog=my_catalog
databricks.otel.schema=my_schema
databricks.otel.table-prefix=otel

# --- Spring AI (OpenAI-compatible -> Databricks FMAPI) ---
# Chat model is created programmatically by DatabricksConfiguration.
# Disable unused OpenAI model auto-configs (they require an API key we don't set).
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none
spring.ai.model.chat=none
spring.ai.openai.chat.options.model=databricks-gpt-5-4
spring.ai.openai.chat.options.temperature=0.4
spring.ai.chat.client.observations.log-prompt=true
spring.ai.chat.client.observations.log-completion=true

# Log prompts and completions in traces (demo only - disable in prod)
spring.ai.chat.observations.log-prompt=true
spring.ai.chat.observations.log-completion=true

# --- OTel Export Mode ---
# mlflow  = OTLP/HTTP to the MLflow endpoint. Traces appear in the Experiments UI. (default)
# zerobus = OTLP/gRPC to the Zerobus endpoint. More efficient; data lands in raw Delta tables.
databricks.otel.export-mode=mlflow
# Required when export-mode=zerobus: <workspace-id>.zerobus.<region>.cloud.databricks.com:443
#databricks.otel.zerobus-endpoint=

# --- OTel ---
management.tracing.sampling.probability=1.0
management.opentelemetry.resource-attributes.service.name=${spring.application.name}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics

# --- Metrics: disable Micrometer OTLP registry (OTel SDK exporter handles export) ---
management.otlp.metrics.export.enabled=false

# --- Metrics filtering: export all metrics ---
management.metrics.enable.all=true


